<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>Weclome to Devfolio</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<h1>Welcome!</h1>
	<p>Hello and thank you for visiting my portfolio page (AKA Devfolio). Here is a list of projects I've worked on for the sake curiousity and skill building.</p>
	<ul id="project-container"></ul>



	
<script>
const container = document.querySelector('#project-container');

async function loadProjects() {
  try {
    const response = await fetch('projects.json');
    const projects = await response.json();

    projects.forEach(project => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${project.url}" target="_blank" rel="noopener">${project.name}</a>`;
      container.appendChild(li);
    });
  } catch (error) {
    console.error('Error loading projects:', error);
    container.innerHTML = '<li>Unable to load projects.</li>';
  }
}

loadProjects();

</script>
	
</body>
