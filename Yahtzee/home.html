<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=100%, initial-scale=1.0">
    <title>Yahtzee</title>
	<script src="query.js"></script>
</head>
<body>
  <header>
    <h1>YAHTZEE</h1>
  </header>
  
  <main>
    <!-- SCORECARD SECTION -->
    <section id="scorecard-section">
      <form id="score-form">
        <table>
          <!-- Updated Scoring Rows -->
          <tr>
            <th>Ones</th>
            <td><button type="button" class="p1" id="ones" aria-label="Score Ones for Player 1">0</button></td>
            <td><button type="button" class="p2" id="ones2" aria-label="Score Ones for Player 2">0</button></td>
            <th>Three of a Kind</th>
            <td><button type="button" class="p1" id="3kind" aria-label="Score Three of a Kind for Player 1">0</button></td>
            <td><button type="button" class="p2" id="3kind2" aria-label="Score Three of a Kind for Player 2">0</button></td>
          </tr>
          <tr>
				<th>Twos</th>
				<td><button class="p1" id="twos" aria-label="Score Twos for Player 1">0</button>
				<td><button class="p2" id="twos2" aria-label="Score Twos for Player 2">0</button></td>
				<th>Four of a Kind</th>
				<td><button class="p1" id="4kind" aria-label="Score Four of a Kind for Player 1">0</button></td>
				<td><button class="p2" id="4kind2" aria-label="Score Four of a Kind for Player 2">0</button></td>
			</tr>
			<tr>
				<th>Threes</th>
				<td><button class="p1" id="threes" aria-label="Score Threes for Player 1">0</button></td>
				<td><button class="p2" id="threes2" aria-label="Score Threes for Player 2">0</button></td>
				<th>Full House</th>
				<td><button class="p1" id="fullHouse" aria-label="Score Full House for Player 1">0</button></td>
				<td><button class="p2" id="fullHouse2" aria-label="Score Full House for Player 2">0</button></td>
			</tr>
			<tr>
				<th>Fours</th>
				<td><button class="p1" id="fours" aria-label="Score Fours for Player 1">0</button></td>
				<td><button class="p2" id="fours2" aria-label="Score Fours for Player 2">0</button></td>
				<th>Small Straight</th>
				<td><button class="p1" id="sStraight" aria-label="Score Small Straight for Player 1">0</button></td>
				<td><button class="p2" id="sStraight2" aria-label="Score Small Straight for Player 2">0</button></td>
			</tr>
			<tr>
				<th>Fives</th>
				<td><button class="p1" id="fives" aria-label="Score Fives for Player 1">0</button></td>
				<td><button class="p2" id="fives2" aria-label="Score Fives for Player 2">0</button></td>
				<th>Large Straight</th>
				<td><button class="p1" id="lStraight" aria-label="Score Large Straight for Player 1">0</button></td>
				<td><button class="p2" id="lStraight2" aria-label="Score Large Straight for Player 2">0</button></td>
			</tr>
			<tr>
				<th>Sixes</th>
				<td><button class="p1" id="sixes" aria-label="Score Sixes for Player 1">0</button></td>
				<td><button class="p2" id="sixes2" aria-label="Score Sixes for Player 2">0</button></td>
				<th>5 of a Kind</th>
				<td><button class="p1" id="5kind" aria-label="Score 5 of a Kind for Player 1">0</button></td>
				<td><button class="p2" id="5kind2" aria-label="Score 5 of a Kind for Player 2">0</button></td>
			</tr>
			<tr>
				<th>Bonus (upper total > 62)</th>
				<td><label class="p1" id="bonus" aria-label="Bonus for Player 1">0</label></td>
				<td><label class="p2" id="bonus2" aria-label="Bonus for Player 2">0</label></td>
				<th>Chance</th>
				<td><button class="p1" id="chance" aria-label="Score Chance for Player 1">0</button></td>
				<td><button class="p2" id="chance2" aria-label="Score Chance for Player 2">0</button></td>
			</tr>          
          <!-- Updated Totals (using <output> instead of <label>) -->
          <tr>
            <th>Upper Total</th>
            <td><output class="p1" id="upper">0</output></td>
            <td><output class="p2" id="upper2">0</output></td>
            <th>Lower Total</th>
            <td><output class="p1" id="lower">0</output></td>
            <td><output class="p2" id="lower2">0</output></td>
          </tr>
          <tr>
            <th colspan="6">Grand Total</th>
          </tr>
          <tr>
            <th colspan="3"><output class="name"></output></th>
            <th colspan="3"><output class="name2"></output></th>
          </tr>
          <tr>
            <td colspan="3"><output class="p1" id="grand">0</output></td>
            <td colspan="3"><output class="p2" id="grand2">0</output></td>
          </tr>
        </table>
        <br>
        <input type="submit" value="END GAME">
      </form>
    </section>
  <!-- CONTROLS & DICE SECTION -->
    <section id="controls-section">
      <p>It is <output id="turnPlayer"></output>'s turn.</p>
      <p>Roll <output id="turn">0</output></p>
      <button type="button" id="roll">Roll Dice</button>

      <div>
        <form id="reroll">
          <table class="noBorder">
            <tr>
              <td class="noBorder"><output class="result"></output></td>
              <td class="noBorder"><output class="result"></output></td>
              <td class="noBorder"><output class="result"></output></td>
              <td class="noBorder"><output class="result"></output></td>
              <td class="noBorder"><output class="result"></output></td>
            </tr>
            
            <!-- Fixed duplicate class attribute here -->
            <tr id="checkboxes" class="hide noBorder">
              <td class="noBorder"><input type="checkbox" name="dice" aria-label="Keep die 1"></td>
              <td class="noBorder"><input type="checkbox" name="dice" aria-label="Keep die 2"></td>
              <td class="noBorder"><input type="checkbox" name="dice" aria-label="Keep die 3"></td>
              <td class="noBorder"><input type="checkbox" name="dice" aria-label="Keep die 4"></td>
              <td class="noBorder"><input type="checkbox" name="dice" aria-label="Keep die 5"></td>
            </tr>
          </table>
          <input type="submit" value="Reroll" name="reroll" class="hide">
        </form>
      </div>
      
      <ul id="results" class="hide"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
