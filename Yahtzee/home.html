<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>YAHTZEE</title>
	<script src="query.js"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>YAHTZEE</h1>
	<div>
		<form id="game"><table>
			<tr>
				<th colspan="3">Upper Section</th>
				<th colspan="3">Lower Section</th>
			</tr>
			<tr>
				<th>How to score</th>
				<th><label class="name"></label></th>
				<th><label class="name2"></label></th>
				<th>How to score</th>
				<th><label class="name"></label></th>
				<th><label class="name2"></label></th>				
			</tr>
			<tr>
				<th>Ones</th>
				<td><button class="p1" id="ones">0</button></td>
				<td><button class="p2" id="ones2">0</button></td>
				<th>Three of a Kind</th>
				<td><button class="p1" id="3kind">0</button></td>
				<td><button class="p2" id="3kind2">0</button></td>
			</tr>
			<tr>
				<th>Twos</th>
				<td><button class="p1" id="twos">0</button>
				<td><button class="p2" id="twos2">0</button>
				<th>Four of a Kind</th>
				<td><button class="p1" id="4kind">0</button></td>
				<td><button class="p2" id="4kind2">0</button></td>
			</tr>
			<tr>
				<th>Threes</th>
				<td><button class="p1" id="threes">0</button></td>
				<td><button class="p2" id="threes2">0</button></td>
				<th>Full House</th>
				<td><button class="p1" id="fullHouse">0</button></td>
				<td><button class="p2" id="fullHouse2">0</button></td>
			</tr>
			<tr>
				<th>Fours</th>
				<td><button class="p1" id="fours">0</button></td>
				<td><button class="p2" id="fours2">0</button></td>
				<th>Small Straight</th>
				<td><button class="p1" id="sStraight">0</button></td>
				<td><button class="p2" id="sStraight2">0</button></td>
			</tr>
			<tr>
				<th>Fives</th>
				<td><button class="p1" id="fives">0</button></td>
				<td><button class="p2" id="fives2">0</button></td>
				<th>Large Straight</th>
				<td><button class="p1" id="lStraight">0</button></td>
				<td><button class="p2" id="lStraight2">0</button></td>
			</tr>
			<tr>
				<th>Sixes</th>
				<td><button class="p1" id="sixes">0</button></td>
				<td><button class="p2" id="sixes2">0</button></td>
				<th>5 of a Kind</th>
				<td><button class="p1" id="5kind">0</button></td>
				<td><button class="p2" id="5kind2">0</button></td>
			</tr>
			<tr>
				<th>Bonus (upper total > 62)</th>
				<td><label class="p1" id="bonus">0</label></td>
				<td><label class="p2" id="bonus2">0</label></td>
				<th>Chance</th>
				<td><button class="p1" id="chance">0</button></td>
				<td><button class="p2" id="chance2">0</button></td>
			</tr>
			<tr>
				<th>Upper Total</th>
				<td><label class="p1" id="upper">0</label></td>
				<td><label class="p2" id="upper2">0</label></td>
				<th>Lower Total</th>
				<td><label class="p1" id="lower">0</label></td>
				<td><label class="p2" id="lower2">0</label></td>
			</tr>
			<tr>
				<th colspan="6">Grand Total</th>
			</tr>
			<tr>
				<th colspan="3"><label class="name"></label></td>
				<th colspan="3"><label class="name2"></label></td>
			</tr>
			<tr>
				<td colspan="3"><label class="p1" id="grand">0</label></td>
				<td colspan="3"><label class="p2" id="grand2">0</label></td>
			</tr>
		</table>
		<br>
		<input type="submit" value="END GAME">
		</form>
	</div>
	<p>It is <label id="turnPlayer"></label>'s turn.</p>
	<p>Roll <label id="turn">0</label></p>
	<button id="roll">Roll Dice</button>	
	<div><form id="reroll">		
		<table class="noBorder">
			<tr>
				<td class="noBorder"><label class="result"></label></td>
				<td class="noBorder"><label class="result"></label></td>
				<td class="noBorder"><label class="result"></label></td>
				<td class="noBorder"><label class="result"></label></td>
				<td class="noBorder"><label class="result"></label></td>
			</tr>
			<tr id="checkboxes" class="hide" class="no border">
				<td class="noBorder"><input type="checkbox" name="dice"></td>
				<td class="noBorder"><input type="checkbox" name="dice"></td>
				<td class="noBorder"><input type="checkbox" name="dice"></td>
				<td class="noBorder"><input type="checkbox" name="dice"></td>
				<td class="noBorder"><input type="checkbox" name="dice"></td>
			</tr>
		</table>
		<input type="submit" value="Reroll" name="reroll" class="hide">
	</form></div>
	<ul id="results" class="hide"></ul>	
	<script src="script.js"></script>
</body>
</html>
