<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>Weclome to Devfolio</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<h1>Welcome!</h1>
	<p>Hello and thank you for visiting my portfolio page (AKA Devfolio). Here is a list of projects I've worked on for the sake curiousity and skill building.</p>
	<ul id="project-container"></ul>


	<script>
		const projects = [
		  { name: 'Monopoly', url: 'https://knighteyes.github.io/devfolio/Monopoly/home.html' },
		  { name: 'Yahtzee', url: 'https://knighteyes.github.io/devfolio/Yahtzee/home.html' },
		];

		const container = document.querySelector('#project-container');

		projects.forEach(project => {
		  const li = document.createElement('li');
		  li.innerHTML = `<a href="${project.url}" target="_blank" rel="noopener">${project.name}</a>`;
		  container.appendChild(li);
		});
	</script>
	
</body>
