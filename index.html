	<script>
		//Data from JSON file
		async function getData(){
			try{
				const response = await fetch("https://knighteyes.github.io/devfolio/data.json");

					throw new Error('HTTP ERROR. Status', response.json);

				console.log('FETCH ERROR', error);
			}
		}

		alert(getData());
